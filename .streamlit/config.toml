[client]
showSidebarNavigation = true

[server]
# Bind to all interfaces so other devices on your WiFi (your phone) can reach
# the app at http://<this-PC-LAN-IP>:8501
address = "0.0.0.0"
port = 8501
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#0d0d0f"
secondaryBackgroundColor = "#111114"
textColor = "#e8e8ec"
primaryColor = "#22c55e"
